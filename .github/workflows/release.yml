name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build standalone binaries for 3 platforms
  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-14           # Apple Silicon runner
            target: darwin-arm64
            artifact: jarvis-admin-darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
            artifact: jarvis-admin-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: jarvis-admin-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix server

      - name: Build frontend
        run: npm run build

      - name: Build server
        run: npx tsc
        working-directory: server

      - name: Prepare bundle directory
        run: |
          mkdir -p bundle/server/dist
          mkdir -p bundle/server/src/data
          mkdir -p bundle/public

          # Server compiled output
          cp -r server/dist/* bundle/server/dist/

          # Server dependencies
          cp server/package.json bundle/server/
          cd bundle/server && npm ci --omit=dev && cd ../..

          # Service registry data (imported by install routes)
          cp server/src/data/service-registry.json bundle/server/src/data/

          # Frontend build
          cp -r dist/* bundle/public/

      - name: Create standalone binary
        run: |
          cd bundle
          # Create entry point that sets STATIC_DIR
          cat > entry.ts << 'ENTRY'
          import { join, resolve } from 'node:path'
          import { existsSync } from 'node:fs'

          // process.execPath gives the real binary path in bun-compiled binaries
          const binaryDir = join(process.execPath, '..')
          const publicDir = join(binaryDir, 'public')
          if (existsSync(publicDir)) {
            process.env.STATIC_DIR = resolve(publicDir)
          }

          await import('./server/dist/index.js')
          ENTRY

          bun build entry.ts \
            --compile \
            --target=bun-${{ matrix.target == 'darwin-arm64' && 'darwin-arm64' || matrix.target == 'linux-x64' && 'linux-x64' || 'linux-arm64' }} \
            --outfile ${{ matrix.artifact }}

      - name: Verify binary (native only)
        if: matrix.target != 'linux-arm64'
        run: |
          chmod +x bundle/${{ matrix.artifact }}
          timeout 5 bundle/${{ matrix.artifact }} || true
          echo "Binary created successfully"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bundle/${{ matrix.artifact }}

      - name: Upload public assets (once)
        if: matrix.target == 'linux-x64'
        run: tar czf public.tar.gz -C bundle public
      - uses: actions/upload-artifact@v4
        if: matrix.target == 'linux-x64'
        with:
          name: public-assets
          path: public.tar.gz

  # Create GitHub Release with binaries
  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in binaries/*/; do
            name=$(basename "$dir")
            # Skip non-binary dirs (public-assets)
            [[ -f "$dir/$name" ]] && cp "$dir/$name" "release/$name" && chmod +x "release/$name"
          done

          # Copy public assets tarball
          cp binaries/public-assets/public.tar.gz release/ 2>/dev/null || true

          # Create checksums
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
          body: |
            ## Install

            **One-liner:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **npx (requires Node.js):**
            ```bash
            npx @alexberardi/jarvis-admin
            ```

            **Manual download:**
            | Platform | Binary |
            |----------|--------|
            | macOS (Apple Silicon) | `jarvis-admin-darwin-arm64` |
            | Linux (x86_64) | `jarvis-admin-linux-x64` |
            | Linux (ARM64 / Pi 5) | `jarvis-admin-linux-arm64` |

            After downloading, make executable and run:
            ```bash
            chmod +x jarvis-admin-*
            ./jarvis-admin-*
            # Open http://localhost:7711
            ```

  # Publish to npm
  publish-npm:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix server

      - name: Build frontend
        run: npm run build

      - name: Build server
        run: npx tsc
        working-directory: server

      - name: Prepare npm package
        run: |
          mkdir -p npm-pkg/server/dist
          mkdir -p npm-pkg/server/src/data
          mkdir -p npm-pkg/public
          mkdir -p npm-pkg/bin

          # Server
          cp -r server/dist/* npm-pkg/server/dist/
          cp server/package.json npm-pkg/server/
          cp server/package-lock.json npm-pkg/server/
          cp server/src/data/service-registry.json npm-pkg/server/src/data/

          # Frontend
          cp -r dist/* npm-pkg/public/

          # CLI entry
          cp bin/jarvis-admin.mjs npm-pkg/bin/

          # Package metadata
          cp npm-package.json npm-pkg/package.json
          cp README.md npm-pkg/ 2>/dev/null || true

      - name: Install server production deps
        run: cd npm-pkg/server && npm ci --omit=dev

      - name: Publish to npm
        run: cd npm-pkg && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Also build Docker image on release
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
